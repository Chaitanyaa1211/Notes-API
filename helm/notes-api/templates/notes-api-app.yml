apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Release.Name }}-deployment


spec:

  replicas: {{ .Values.app.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Release.Name }}-app

  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-app


    spec:

      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - >
              until nc -z {{ .Release.Name }}-postgres-svc 5432;
              do echo waiting for db; sleep 2; done;      


      containers:
        - name: notes-api
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          ports:
            - containerPort: {{ .Values.app.service.targetPort }}
          env:
            - name: DB_HOST
              value: "{{ .Release.Name }}-postgres-svc"
            - name: DB_PORT
              value: "{{ .Values.app.env.DB_PORT }}"
            - name: DB_NAME
              value: "{{ .Values.app.env.DB_NAME }}"
            - name: DB_USER
              value: "{{ .Values.app.env.DB_USER }}"
            - name: DB_PASSWORD
              value: "{{ .Values.app.env.DB_PASSWORD }}"


            

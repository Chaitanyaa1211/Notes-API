apiVersion: apps/v1
kind: Deployment

metadata:
  name: notes-app-deployment


spec:

  replicas: 2

  selector:
    matchLabels:
      app: notes-api-app

  template:
    metadata:
      labels:
        app: notes-api-app


    spec:
      containers:
        - name: notes-api
          image: chaitanyaaaa/notes-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "notesdb"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"


            
